<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    crossorigin="anonymous"></script>
</head>
<body>
    
<div class="container">
    <img src="" width="500" alt="">
    <h1 class="ism"></h1>
    <p class="kurs"></p>
</div>

<div class="container mt-5">


<h1 class="ism text-center mb-4"></h1>


<div class="text-center mb-4">
    <img src="" width="400" class="img-fluid rounded shadow">
</div>


<div class="card p-3 mb-3">
    Ta'lim yo'nalishi: <span class="yonalish"></span>
</div>

<div class="card p-3 mb-3">
    Sertifikat raqami: <span class="sertifikat"></span>
</div>

<div class="card p-3 mb-3">
    Sertifikat sanasi: <span class="sana"></span>
</div>

<div class="card p-3 mb-3">
    Tug'ilgan yili: <span class="yil"></span>
</div>

<div class="card p-3 mb-3">
    Frilancing sahifasi: <span class="frilance"></span>
</div>

<script src="db.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", ()=>{
        let urlString = window.location.search
        let urlParams = new URLSearchParams(urlString)
        let id = urlParams.get("id")
        let allStudents = Students.find(i => i.id == id)

        console.log(allStudents);

        document.querySelector(".ism").innerHTML = allStudents.fio,
        document.querySelector("img").src = allStudents.rasm,
        document.querySelector(".kurs").innerHTML = allStudents.kurs
        
    })

    document.addEventListener("DOMContentLoaded", () => {

    let urlString = window.location.search
    let urlParams = new URLSearchParams(urlString)
    let id = urlParams.get("id")

    let student = Students.find(i => i.id == id)

    document.querySelector("img").src = student.rasm,
    document.querySelector(".ism").innerHTML = student.fio,

    document.querySelector(".yonalish").innerHTML = student.kurs,
    document.querySelector(".sertifikat").innerHTML = student.sertifikat,
    document.querySelector(".sana").innerHTML = student.sana,
    document.querySelector(".yil").innerHTML = student.yil,
    document.querySelector(".frilance").innerHTML = student.frilance

})
</script>
</body>
</html>
